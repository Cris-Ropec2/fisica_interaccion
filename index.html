<!DOCTYPE html>
<html lang="es">
    <head>
        <title>Three.js - Simulación ITP</title>
        <meta charset=utf-8 />
        <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
        <!-- Bootstrap para el Navbar y Footer -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
        <link type="text/css" rel="stylesheet" href="./assets/css/main.css">
        <link rel="icon" type="image/png" href="./assets/img/favicon.png">
        <style>
            body { margin: 0; overflow: hidden; background-color: #000; }
            #container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
            
            /* Ajustes para que Three.js no tape el contenido */
            .navbar { z-index: 10; background: rgba(33, 37, 41, 0.9) !important; }
            .footer { 
                position: absolute; 
                bottom: 0; 
                width: 100%; 
                z-index: 10; 
                background: rgba(33, 37, 41, 0.9); 
                color: white;
                padding: 10px 0;
            }
            #info-overlay {
                position: absolute;
                top: 70px;
                left: 20px;
                z-index: 5;
                color: white;
                text-shadow: 1px 1px 2px black;
                pointer-events: none;
            }
        </style>
    </head>
    <body>

        <!-- NAVBAR -->
        <nav class="navbar navbar-expand-lg navbar-dark shadow">
            <div class="container-fluid">
                <a class="navbar-brand" href="#">
                    <strong>ITP</strong> | Graficación
                </a>
                <div class="navbar-text text-light d-none d-md-block">
                    Simulación Física con Octree y Soporte Draco
                </div>
            </div>
        </nav>

        <!-- INFO SOBRE EL JUEGO -->
        <div id="info-overlay">
            <h5>Controles:</h5>
            <p class="mb-0">WASD: Movimiento | ESPACIO: Saltar</p>
            <p>Click: Lanzar Patito</p>
        </div>

        <div id="container"></div>

        <!-- FOOTER -->
        <footer class="footer mt-auto py-3 shadow-lg">
            <div class="container text-center">
                <div class="row">
                    <div class="col-md-6 text-md-start">
                        <span class="text-muted">2026 Simulación de Sistemas</span>
                    </div>
                    <div class="col-md-6 text-md-end">
                        <strong>Programador:</strong> Cristopher Rodríguez Pérez 
                        <span class="badge bg-primary ms-2">Ing. Sistemas ITP</span>
                    </div>
                </div>
            </div>
        </footer>

        <script type="importmap">
            {
                "imports": {
                    "three": "https://unpkg.com/three@latest/build/three.module.js",
                    "three/addons/": "https://unpkg.com/three@latest/examples/jsm/"
                }
            }
        </script>

        <script type="module">
            import * as THREE from 'three';
            import Stats from 'three/addons/libs/stats.module.js';
            import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
            import { DRACOLoader } from 'three/addons/loaders/DRACOLoader.js';
            import { Octree } from 'three/addons/math/Octree.js';
            import { OctreeHelper } from 'three/addons/helpers/OctreeHelper.js';
            import { Capsule } from 'three/addons/math/Capsule.js';
            import { GUI } from 'three/addons/libs/lil-gui.module.min.js';

            const timer = new THREE.Timer();
            timer.connect( document );

            const scene = new THREE.Scene();
            scene.background = new THREE.Color( 0x88ccee );
            scene.fog = new THREE.Fog( 0x88ccee, 0, 50 );

            const camera = new THREE.PerspectiveCamera( 70, window.innerWidth / window.innerHeight, 0.1, 1000 );
            camera.rotation.order = 'YXZ';

            const fillLight1 = new THREE.HemisphereLight( 0x8dc1de, 0x00668d, 1.5 );
            fillLight1.position.set( 2, 1, 1 );
            scene.add( fillLight1 );

            const directionalLight = new THREE.DirectionalLight( 0xffffff, 2.5 );
            directionalLight.position.set( - 5, 25, - 1 );
            directionalLight.castShadow = true;
            directionalLight.shadow.camera.near = 0.01;
            directionalLight.shadow.camera.far = 500;
            directionalLight.shadow.camera.right = 30;
            directionalLight.shadow.camera.left = - 30;
            directionalLight.shadow.camera.top  = 30;
            directionalLight.shadow.camera.bottom = - 30;
            directionalLight.shadow.mapSize.width = 1024;
            directionalLight.shadow.mapSize.height = 1024;
            directionalLight.shadow.radius = 4;
            directionalLight.shadow.bias = - 0.00006;
            scene.add( directionalLight );

            const container = document.getElementById( 'container' );

            const renderer = new THREE.WebGLRenderer( { antialias: true } );
            renderer.setPixelRatio( window.devicePixelRatio );
            renderer.setSize( window.innerWidth, window.innerHeight );
            renderer.setAnimationLoop( animate );
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.VSMShadowMap;
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            container.appendChild( renderer.domElement );

            const stats = new Stats();
            stats.domElement.style.position = 'absolute';
            stats.domElement.style.top = '70px'; // Ajustado para no chocar con el Navbar
            stats.domElement.style.right = '20px';
            stats.domElement.style.left = 'auto';
            container.appendChild( stats.domElement );

            const GRAVITY = 30;
            const NUM_SPHERES = 100;
            const SPHERE_RADIUS = 0.2;
            const STEPS_PER_FRAME = 5;

            const sphereGeometry = new THREE.IcosahedronGeometry( SPHERE_RADIUS, 5 );
            const sphereMaterial = new THREE.MeshLambertMaterial( { color: 0xdede8d } );

            const spheres = [];
            let sphereIdx = 0;

            for ( let i = 0; i < NUM_SPHERES; i ++ ) {
                const sphere = new THREE.Mesh( sphereGeometry, sphereMaterial );
                sphere.visible = false; 
                scene.add( sphere );
                const modelGroup = new THREE.Group();
                scene.add(modelGroup);
                spheres.push( {
                    mesh: sphere,
                    model: modelGroup,
                    collider: new THREE.Sphere( new THREE.Vector3( 0, - 100, 0 ), SPHERE_RADIUS ),
                    velocity: new THREE.Vector3()
                } );
            }

            const worldOctree = new Octree();
            const playerCollider = new Capsule( new THREE.Vector3( 0, 0.35, 0 ), new THREE.Vector3( 0, 1, 0 ), 0.35 );
            const playerVelocity = new THREE.Vector3();
            const playerDirection = new THREE.Vector3();

            let playerOnFloor = false;
            let mouseTime = 0;
            const keyStates = {};

            const vector1 = new THREE.Vector3();
            const vector2 = new THREE.Vector3();
            const vector3 = new THREE.Vector3();

            document.addEventListener( 'keydown', ( event ) => { keyStates[ event.code ] = true; } );
            document.addEventListener( 'keyup', ( event ) => { keyStates[ event.code ] = false; } );
            container.addEventListener( 'mousedown', () => {
                document.body.requestPointerLock();
                mouseTime = performance.now();
            } );
            document.addEventListener( 'mouseup', () => {
                if ( document.pointerLockElement !== null ) throwBall();
            } );
            document.body.addEventListener( 'mousemove', ( event ) => {
                if ( document.pointerLockElement === document.body ) {
                    camera.rotation.y -= event.movementX / 500;
                    camera.rotation.x -= event.movementY / 500;
                }
            } );
            window.addEventListener( 'resize', onWindowResize );

            function onWindowResize() {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize( window.innerWidth, window.innerHeight );
            }

            function throwBall() {
                const sphere = spheres[ sphereIdx ];
                if ( ballModel && sphere.model.children.length === 0 ) {
                    const clone = ballModel.clone();
                    clone.scale.set(0.3, 0.3, 0.3);
                    sphere.model.add( clone );
                }
                camera.getWorldDirection( playerDirection );
                sphere.collider.center.copy( playerCollider.end ).addScaledVector( playerDirection, playerCollider.radius * 1.5 );
                const impulse = 15 + 30 * ( 1 - Math.exp( ( mouseTime - performance.now() ) * 0.001 ) );
                sphere.velocity.copy( playerDirection ).multiplyScalar( impulse );
                sphere.velocity.addScaledVector( playerVelocity, 2 );
                sphereIdx = ( sphereIdx + 1 ) % spheres.length;
            }

            function playerCollisions() {
                const result = worldOctree.capsuleIntersect( playerCollider );
                playerOnFloor = false;
                if ( result ) {
                    playerOnFloor = result.normal.y >= 0.15;
                    if ( ! playerOnFloor ) {
                        playerVelocity.addScaledVector( result.normal, - result.normal.dot( playerVelocity ) );
                    }
                    if ( result.depth >= 1e-10 ) {
                        playerCollider.translate( result.normal.multiplyScalar( result.depth ) );
                    }
                }
            }

            function updatePlayer( deltaTime ) {
                let damping = Math.exp( - 4 * deltaTime ) - 1;
                if ( ! playerOnFloor ) {
                    playerVelocity.y -= GRAVITY * deltaTime;
                    damping *= 0.1;
                }
                playerVelocity.addScaledVector( playerVelocity, damping );
                const deltaPosition = playerVelocity.clone().multiplyScalar( deltaTime );
                playerCollider.translate( deltaPosition );
                playerCollisions();
                camera.position.copy( playerCollider.end );
            }

            function updateSpheres( deltaTime ) {
                spheres.forEach( sphere => {
                    sphere.collider.center.addScaledVector( sphere.velocity, deltaTime );
                    const result = worldOctree.sphereIntersect( sphere.collider );
                    if ( result ) {
                        sphere.velocity.addScaledVector( result.normal, - result.normal.dot( sphere.velocity ) * 1.5 );
                        sphere.collider.center.add( result.normal.multiplyScalar( result.depth ) );
                    } else {
                        sphere.velocity.y -= GRAVITY * deltaTime;
                    }
                    const damping = Math.exp( - 1.5 * deltaTime ) - 1;
                    sphere.velocity.addScaledVector( sphere.velocity, damping );
                } );

                for ( const sphere of spheres ) {
                    sphere.mesh.position.copy( sphere.collider.center );
                    if ( sphere.model ) {
                        sphere.model.position.copy( sphere.collider.center );
                        if ( sphere.velocity.length() > 0.2 ) {
                            sphere.model.rotation.x += sphere.velocity.z * 0.05;
                            sphere.model.rotation.z -= sphere.velocity.x * 0.05;
                        }
                    }
                }
            }

            const dracoLoader = new DRACOLoader();
            dracoLoader.setDecoderPath( 'https://www.gstatic.com/draco/versioned/decoders/1.5.6/' );

            const loader = new GLTFLoader().setPath( './models/gltf/' );
            loader.setDRACOLoader( dracoLoader );

            loader.load( 'collision-world.glb', ( gltf ) => {
                scene.add( gltf.scene );
                worldOctree.fromGraphNode( gltf.scene );
                gltf.scene.traverse( child => {
                    if ( child.isMesh ) {
                        child.castShadow = true;
                        child.receiveShadow = true;
                        if ( child.material.map ) child.material.map.anisotropy = 4;
                    }
                } );
                const helper = new OctreeHelper( worldOctree );
                helper.visible = false;
                scene.add( helper );
                const gui = new GUI( { width: 200 } );
                gui.add( { debug: false }, 'debug' ).onChange( value => { helper.visible = value; } );
            } );

            let ballModel;
            loader.load('duck.glb', (gltf) => {
                ballModel = gltf.scene;
                ballModel.traverse(child => {
                    if (child.isMesh) {
                        child.castShadow = true;
                        child.receiveShadow = true;
                    }
                });
            });

            function teleportPlayerIfOob() {
                if ( camera.position.y <= - 25 ) {
                    playerCollider.start.set( 0, 0.35, 0 );
                    playerCollider.end.set( 0, 1, 0 );
                    camera.position.copy( playerCollider.end );
                }
            }

            function animate() {
                timer.update();
                const deltaTime = Math.min( 0.05, timer.getDelta() ) / STEPS_PER_FRAME;
                for ( let i = 0; i < STEPS_PER_FRAME; i ++ ) {
                    controls( deltaTime );
                    updatePlayer( deltaTime );
                    updateSpheres( deltaTime );
                    teleportPlayerIfOob();
                }
                renderer.render( scene, camera );
                stats.update();
            }

            function getForwardVector() {
                camera.getWorldDirection( playerDirection );
                playerDirection.y = 0;
                playerDirection.normalize();
                return playerDirection;
            }

            function getSideVector() {
                camera.getWorldDirection( playerDirection );
                playerDirection.y = 0;
                playerDirection.normalize();
                playerDirection.cross( camera.up );
                return playerDirection;
            }

            function controls( deltaTime ) {
                const speedDelta = deltaTime * ( playerOnFloor ? 25 : 8 );
                if ( keyStates[ 'KeyW' ] ) playerVelocity.add( getForwardVector().multiplyScalar( speedDelta ) );
                if ( keyStates[ 'KeyS' ] ) playerVelocity.add( getForwardVector().multiplyScalar( - speedDelta ) );
                if ( keyStates[ 'KeyA' ] ) playerVelocity.add( getSideVector().multiplyScalar( - speedDelta ) );
                if ( keyStates[ 'KeyD' ] ) playerVelocity.add( getSideVector().multiplyScalar( speedDelta ) );
                if ( playerOnFloor && keyStates[ 'Space' ] ) playerVelocity.y = 15;
            }
        </script>
    </body>
</html>
